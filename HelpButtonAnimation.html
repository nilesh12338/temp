<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{height:200vh;font-family:Arial}
.help{position:fixed;right:20px;top:35%;background:none;border:0;z-index:9999}
svg{width:120px;height:120px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.3));animation:float 8s infinite}
@keyframes float{0%,90%,100%{transform:translateY(0)}92%{transform:translateY(-10px)}96%{transform:translateY(0)}98%{transform:translateY(-6px)}}
.eye{animation:blink 6s infinite;transform-origin:center}
@keyframes blink{0%,46%,50%,100%{transform:scaleY(1)}48%{transform:scaleY(.1)}}
.hand{transform-origin:78px 58px;animation:wave 8s infinite}
@keyframes wave{0%,90%,100%{transform:rotate(0)}92%{transform:rotate(-25deg)}94%{transform:rotate(15deg)}96%{transform:rotate(-20deg)}98%{transform:rotate(0)}}
.bubble{position:absolute;right:110px;top:20px;background:#fff;padding:8px 12px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.2);opacity:0;animation:bubble 8s infinite}
.bubble:after{content:"";position:absolute;right:-8px;top:16px;border:8px solid transparent;border-left-color:#fff}
@keyframes bubble{0%,85%,100%{opacity:0}88%,96%{opacity:1}}
</style></head><body>
<div class="container py-5"><h2>Demo Page</h2><p>Click assistant.</p></div>
<button class="help" data-bs-toggle="modal" data-bs-target="#m"><div class="bubble">Need Help?</div>
<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="30" fill="#fff" stroke="#0d6efd" stroke-width="3"/>
<circle class="eye" cx="42" cy="45" r="2.5"/><circle class="eye" cx="58" cy="45" r="2.5"/>
<path d="M42 58 Q50 65 58 58" fill="none" stroke="#0d6efd" stroke-width="2"/>
<line x1="72" y1="58" x2="85" y2="48" stroke="#0d6efd" stroke-width="4" class="hand"/>
<circle cx="86" cy="47" r="3" fill="#0d6efd"/>
</svg></button>
<div class="modal fade" id="m"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>Help Center</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">Hello! How can I help you?</div></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
