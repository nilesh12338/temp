<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer - File List</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- jQuery (load first) -->
    <script src="./external/jquery-3.4.1.min.js"></script>
    
    <!-- turn.js (depends on jQuery) -->
    <script src="./external/turn.min.js"></script>
    
    <!-- PDF.js library -->
    <script src="./external/pdfjs-2.1.266-dist/build/pdf.js"></script>
    
    <!-- PDF Viewer CSS -->
    <link rel="stylesheet" href="./external/pdfjs-2.1.266-dist/web/viewer.css">
    
    <!-- PDF Turn CSS -->
    <link rel="stylesheet" href="./pdf-turn/pdf-turn.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .pdf-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .pdf-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 5px solid #667eea;
        }

        .pdf-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            border-left-color: #764ba2;
        }

        .pdf-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: inline-block;
        }

        .pdf-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .pdf-size {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 15px;
        }

        .pdf-action {
            display: flex;
            gap: 10px;
        }

        .btn-custom {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-view-custom {
            background-color: #667eea;
            color: white;
        }

        .btn-view-custom:hover {
            background-color: #5568d3;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-download-custom {
            background-color: #f0f0f0;
            color: #333;
        }

        .btn-download-custom:hover {
            background-color: #e0e0e0;
        }

        .footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            font-size: 0.9rem;
            margin-top: 30px;
        }

        #pdfViewerContainer {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            background: #f5f5f5;
            padding: 10px;
        }

        #pdfCanvas {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            max-width: 100%;
            height: auto;
        }

        .pdf-controls-custom {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-top: 12px;
            padding: 10px;
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex-wrap: wrap;
        }

        .pdf-controls-custom button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .pdf-controls-custom button:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .pdf-list {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 PDF Viewer</h1>
            <p>Select a PDF file to view</p>
        </div>

        <div class="pdf-list" id="pdfList">
            <!-- PDF cards will be generated here -->
        </div>

        <div class="footer">
            <p>Click on any PDF file to open it in the viewer</p>
        </div>
    </div>

    <!-- Bootstrap Modal for PDF Viewer -->
    <div class="modal fade" id="pdfModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen-lg-down" style="max-width: 95vw; height: 95vh; margin: auto;">
            <div class="modal-content" style="height: 100%;">
                <div class="modal-header">
                    <h5 class="modal-title" id="pdfModalTitle">PDF Viewer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" style="display: flex; flex-direction: column; height: calc(95vh - 70px); padding: 0;">
                    <div id="pdfViewerContainer" style="flex: 1; overflow: auto;">
                        <!-- PDF content will be loaded here -->
                        <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
                            <div style="text-align: center;">
                                <div style="border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
                                <span style="color: #666; font-size: 1.1rem;">Loading PDF...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- PDF Turn script (depends on jQuery and turn.js) -->
    <script src="./pdf-turn/pdf-turn.js"></script>

    <script>
        // List of PDF files with metadata
        const pdfFiles = [
            {
                name: 'Sample Document 1',
                path: './external/pdfjs-2.1.266-dist/web/header-footer.pdf',
                viewerPath: 'header-footer.pdf',
                displayName: 'header-footer.pdf',
                description: 'PDF with header and footer'
            },
            {
                name: 'Sample Document 2',
                path: './external/pdfjs-2.1.266-dist/web/compressed.tracemonkey-pldi-09.pdf',
                viewerPath: 'compressed.tracemonkey-pldi-09.pdf',
                displayName: 'compressed.tracemonkey-pldi-09.pdf',
                description: 'Technical paper PDF'
            }
        ];

        // Initialize PDF list
        function initializePdfList() {
            const pdfListContainer = document.getElementById('pdfList');

            if (pdfFiles.length === 0) {
                pdfListContainer.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
                        <div style="color: white;">
                            <div style="font-size: 4rem; margin-bottom: 20px; opacity: 0.7;">📁</div>
                            <h2>No PDF files available</h2>
                            <p>Add PDF files to the project to display them here.</p>
                        </div>
                    </div>
                `;
                return;
            }

            pdfListContainer.innerHTML = pdfFiles.map((pdf, index) => `
                <div class="pdf-card">
                    <div class="pdf-icon">📕</div>
                    <div class="pdf-name">${pdf.name}</div>
                    <div class="pdf-size">${pdf.displayName}</div>
                    <div class="pdf-action">
                        <button class="btn-custom btn-view-custom" onclick="openPdfViewer('${pdf.viewerPath}', '${pdf.name}')">
                            👁️ View
                        </button>
                        <a href="${pdf.path}" class="btn-custom btn-download-custom" download>
                            ⬇️ Download
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // Open PDF in Bootstrap modal via AJAX
        function openPdfViewer(pdfPath, pdfName) {
            const pdfModalTitle = document.getElementById('pdfModalTitle');
            const pdfViewerContainer = document.getElementById('pdfViewerContainer');
            
            pdfModalTitle.textContent = pdfName;

            // Show loading
            pdfViewerContainer.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
                    <div style="text-align: center;">
                        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
                        <span style="color: #666; font-size: 1.1rem;">Loading PDF...</span>
                    </div>
                </div>
            `;

            // Show Bootstrap modal
            const modal = new bootstrap.Modal(document.getElementById('pdfModal'));
            modal.show();

            // Ensure modal container is scrolled to top when opened
            try {
                const containerEl = document.getElementById('pdfViewerContainer');
                if (containerEl) containerEl.scrollTop = 0;
            } catch (e) {
                console.warn('Could not reset container scroll on open:', e);
            }

            // Load viewer.html via AJAX and inject its body into the modal (only once).
            const viewerHtmlUrl = './external/pdfjs-2.1.266-dist/web/viewer.html';
            const viewerJsSrc = './external/pdfjs-2.1.266-dist/web/viewer.js';

            // Helper to set file param in the URL so viewer.js picks it up on init
            function setViewerUrlParam(fileRelativePath) {
                try {
                    const newUrl = window.location.pathname + '?file=' + encodeURIComponent('./external/pdfjs-2.1.266-dist/web/' + fileRelativePath);
                    history.replaceState(null, '', newUrl);
                } catch (e) {
                    console.warn('Could not set URL param for viewer:', e);
                }
            }

            // If viewer.js already loaded, just call the application API to open the file
            if (window.PDFViewerApplication && typeof window.PDFViewerApplication.open === 'function') {
                setViewerUrlParam(pdfPath);
                try {
                    window.PDFViewerApplication.open('./external/pdfjs-2.1.266-dist/web/' + pdfPath);
                } catch (e) {
                    console.warn('PDFViewerApplication.open failed, attempting reload:', e);
                }
                // make sure container is scrolled to top
                setTimeout(() => { const c = document.getElementById('pdfViewerContainer'); if (c) c.scrollTop = 0; }, 50);
                return;
            }

            // Viewer not loaded yet — fetch viewer.html and insert its body into the modal container
            fetch(viewerHtmlUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load viewer.html');
                    return response.text();
                })

                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');

                    // Ensure relative URLs inside viewer.html resolve to its directory by adding a <base>
                    try {
                        const baseId = 'pdfViewerBase';
                        let baseEl = document.getElementById(baseId);
                        const viewerBase = './external/pdfjs-2.1.266-dist/web/';
                        if (!baseEl) {
                            baseEl = document.createElement('base');
                            baseEl.id = baseId;
                            baseEl.href = viewerBase;
                            // Add as first element in head
                            const head = document.head || document.getElementsByTagName('head')[0];
                            if (head.firstChild) head.insertBefore(baseEl, head.firstChild);
                            else head.appendChild(baseEl);
                        } else {
                            baseEl.href = viewerBase;
                        }
                    } catch (e) {
                        console.warn('Could not insert base element for viewer resources:', e);
                    }

                    // Copy stylesheet and style tags from fetched viewer.html head into current document head
                    try {
                        const head = document.head || document.getElementsByTagName('head')[0];
                        const remoteHead = doc.querySelector('head');
                        if (remoteHead) {
                            // copy link rel=stylesheet
                            remoteHead.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                                const href = link.getAttribute('href');
                                if (!href) return;
                                // avoid duplicates
                                const exists = Array.from(document.querySelectorAll('link[rel="stylesheet"]')).some(l => l.getAttribute('href') === href || l.href === link.href);
                                if (!exists) {
                                    const newLink = document.createElement('link');
                                    newLink.rel = 'stylesheet';
                                    newLink.href = href;
                                    head.appendChild(newLink);
                                }
                            });
                            // copy inline style tags
                            remoteHead.querySelectorAll('style').forEach(style => {
                                const newStyle = document.createElement('style');
                                newStyle.textContent = style.textContent;
                                head.appendChild(newStyle);
                            });
                        }
                    } catch (e) {
                        console.warn('Could not copy viewer head styles:', e);
                    }

                    // Insert the body content of viewer.html into the modal's container
                    pdfViewerContainer.innerHTML = doc.body.innerHTML;

                    // Ensure the viewer's CSS is applied, then set ?file=...
                    setViewerUrlParam(pdfPath);

                    // Load viewer.js dynamically (only once)
                    const existingScript = Array.from(document.scripts).find(s => s.src && s.src.indexOf('viewer.js') !== -1);
                    if (!existingScript) {
                        const script = document.createElement('script');
                        script.src = viewerJsSrc;
                        // cache-bust to ensure fresh load if needed
                        script.onload = function() {
                            console.log('viewer.js loaded');
                            // small delay to allow viewer to initialize and process the ?file param
                            setTimeout(() => { const c = document.getElementById('pdfViewerContainer'); if (c) c.scrollTop = 0; }, 100);
                        };
                        script.onerror = function(err) {
                            console.error('Failed to load viewer.js', err);
                            pdfViewerContainer.innerHTML = `<div style="color:#d32f2f;padding:20px">❌ Failed to initialize viewer.</div>`;
                        };
                        document.body.appendChild(script);
                    } else {
                        // viewer.js already present but viewer DOM wasn't — attempt initialization call
                        setTimeout(() => { try { if (window.PDFViewerApplication && window.PDFViewerApplication.open) window.PDFViewerApplication.open('./external/pdfjs-2.1.266-dist/web/' + pdfPath); } catch (e) { console.warn(e); } }, 50);
                    }
                })
                .catch(error => {
                    console.error('Error loading viewer.html:', error);
                    pdfViewerContainer.innerHTML = `<div style="color: #d32f2f; padding: 20px; text-align: center;">❌ Failed to load viewer content.<br>${error.message}</div>`;
                });
        }

        // PDF rendering is handled by the injected `viewer.html` and `viewer.js`.
        // We purposely avoid rendering PDFs directly in this file to let the
        // embedded viewer implementation manage navigation, zoom and thumbnails.

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializePdfList);
    </script>
</body>
</html>
