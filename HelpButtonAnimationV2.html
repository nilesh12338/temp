<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{margin:0;height:200vh;background:#eef3f8;font-family:Arial}
.helper{position:fixed;right:20px;top:35%;border:0;background:transparent;z-index:9999}
.wrap{position:relative;width:130px}
.bubble{position:absolute;right:120px;top:10px;background:#fff;padding:8px 12px;border-radius:18px;box-shadow:0 4px 10px rgba(0,0,0,.2);animation:bubble 8s infinite}
.bubble:after{content:"";position:absolute;right:-8px;top:16px;border:8px solid transparent;border-left-color:#fff}
svg{width:120px;height:120px;animation:bounce 8s infinite;filter:drop-shadow(0 8px 14px rgba(0,0,0,.25))}
.eye{transform-origin:center;animation:blink 6s infinite}
.pupil{animation:look 7s infinite}
.hand{transform-origin:78px 56px;animation:wave 8s infinite}
@keyframes blink{0%,46%,50%,100%{transform:scaleY(1)}48%{transform:scaleY(.08)}}
@keyframes look{0%,30%,100%{transform:translateX(0)}40%{transform:translateX(2px)}60%{transform:translateX(-2px)}}
@keyframes wave{0%,90%,100%{transform:rotate(0)}92%{transform:rotate(-25deg)}94%{transform:rotate(15deg)}96%{transform:rotate(-20deg)}}
@keyframes bounce{0%,90%,100%{transform:translateY(0)}93%{transform:translateY(-8px)}96%{transform:translateY(0)}98%{transform:translateY(-4px)}}
@keyframes bubble{0%,84%,100%{opacity:0}87%,97%{opacity:1}}
</style></head><body>
<div class="container py-5"><h2>Clippy-inspired Floating Assistant</h2><p>Click the assistant.</p></div>
<button class="helper" data-bs-toggle="modal" data-bs-target="#help">
<div class="wrap"><div class="bubble">Need Help?</div>
<svg viewBox="0 0 100 100">
<ellipse cx="50" cy="93" rx="22" ry="4" fill="#000" opacity=".15"/>
<circle cx="50" cy="50" r="28" fill="#fff" stroke="#0d6efd" stroke-width="3"/>
<g class="eye"><circle cx="42" cy="45" r="4" fill="#fff" stroke="#333"/><circle class="pupil" cx="42" cy="45" r="1.5"/></g>
<g class="eye"><circle cx="58" cy="45" r="4" fill="#fff" stroke="#333"/><circle class="pupil" cx="58" cy="45" r="1.5"/></g>
<path d="M42 60 Q50 66 58 60" fill="none" stroke="#0d6efd" stroke-width="2"/>
<line class="hand" x1="70" y1="56" x2="83" y2="47" stroke="#0d6efd" stroke-width="4"/><circle cx="84" cy="46" r="3" fill="#0d6efd"/>
</svg></div></button>
<div class="modal fade" id="help"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>Help Assistant</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">Hello! I'm your friendly assistant.</div></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
